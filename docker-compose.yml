services:
  cam2ip-mcp:
    build:
      context: .
      dockerfile: Containerfile
    image: cam2ip-mcp:latest
    container_name: cam2ip-mcp
    
    # Grant access to video devices
    devices:
      - /dev/video0:/dev/video0
    
    # Expose cam2ip HTTP server port
    ports:
      - "56000:56000"
      # MCP HTTP server port (used in sse and streamable-http modes)
      - "3000:3000"
    
    # Environment variables
    environment:
      # Set to "false" to skip starting the built-in cam2ip server
      - CAM2IP_ENABLED=true
      - CAM2IP_BASE_URL=http://127.0.0.1:56000
      - CAM2IP_HTTP_TIMEOUT_S=5.0
      - CAM2IP_BIND_ADDR=0.0.0.0:56000
      - CAM2IP_INDEX=0
      # Optional: Customize frame settings
      - CAM2IP_WIDTH=640
      - CAM2IP_HEIGHT=480
      - CAM2IP_QUALITY=75
      - CAM2IP_DELAY=10
      # MCP transport mode:
      #   stdio          - MCP over stdin/stdout (default, for Claude Desktop, Cline, etc.)
      #   sse            - MCP over Server-Sent Events (legacy HTTP transport)
      #   streamable-http - MCP over Streamable HTTP (current spec transport)
      - MCP_MODE=stdio
      - MCP_HTTP_HOST=0.0.0.0
      - MCP_HTTP_PORT=3000
    
    # Restart policy
    restart: unless-stopped
    
    # For MCP stdio communication
    stdin_open: true
    tty: true
    
    # Optional: Custom network
    # networks:
    #   - cam2ip-network

# Optional: Define custom network
# networks:
#   cam2ip-network:
#     driver: bridge
